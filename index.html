<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yoga">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Yoga Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #212e53;
    color: #ebaca2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    padding-top: calc(env(safe-area-inset-top, 20px) + 28px);
  }

  h1 {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #bed3c3;
    margin-bottom: 28px;
  }

  .stats {
    display: flex;
    gap: 36px;
    margin-bottom: 28px;
  }

  .stat { text-align: center; }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: #ebaca2;
  }

  .stat-label {
    font-size: 11px;
    color: #4a919e;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .divider {
    width: 100%;
    max-width: 340px;
    height: 1px;
    background: #2d3a5c;
    margin-bottom: 24px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 340px;
    margin-bottom: 16px;
  }

  .month-nav button {
    background: none;
    border: none;
    color: #4a919e;
    font-size: 22px;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 50%;
  }

  .month-nav button:active {
    background: rgba(74, 145, 158, 0.15);
  }

  .month-label {
    font-size: 16px;
    font-weight: 500;
    color: #bed3c3;
    letter-spacing: 0.5px;
  }

  .weekday-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    width: 100%;
    max-width: 340px;
    margin-bottom: 6px;
  }

  .weekday-header span {
    text-align: center;
    font-size: 11px;
    color: #4a6a8a;
    font-weight: 500;
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 340px;
  }

  .day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    color: #8a9dbd;
  }

  .day:active { transform: scale(0.88); }
  .day.empty { cursor: default; }

  .day.completed {
    background: #ce6a6b;
    color: #fff;
    font-weight: 600;
  }

  .day.today { border: 2px solid #4a919e; }
  .day.today.completed { border: 2px solid #ebaca2; }
  .day.future { color: #2d3a5c; cursor: default; }

  .day:not(.empty):not(.future):not(.completed):hover {
    background: rgba(74, 145, 158, 0.12);
  }

  .graph-section {
    width: 100%;
    max-width: 340px;
    margin-top: 28px;
  }

  .graph-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .graph-label {
    font-size: 11px;
    color: #4a919e;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0;
  }

  .graph-toggle {
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #2d3a5c;
  }

  .graph-toggle button {
    background: none;
    border: none;
    color: #4a6a8a;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  .graph-toggle button.active {
    background: #4a919e;
    color: #fff;
  }

  .graph-chart-wrap {
    position: relative;
    width: 100%;
    height: 160px;
  }

  .graph-ends {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .graph-ends span {
    font-size: 10px;
    color: #4a6a8a;
  }

  .backup-section {
    margin-top: 32px;
    display: flex;
    gap: 12px;
  }

  .backup-btn {
    background: none;
    border: 1px solid #2d3a5c;
    color: #4a919e;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }

  .backup-btn:active { background: rgba(74, 145, 158, 0.15); }

  .backup-msg {
    margin-top: 10px;
    font-size: 13px;
    color: #4a919e;
    text-align: center;
    min-height: 20px;
  }
</style>
</head>
<body>

<h1>Yoga</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-value" id="currentStreak">0</div>
    <div class="stat-label">Streak</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="longestStreak">0</div>
    <div class="stat-label">Best</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="totalDays">0</div>
    <div class="stat-label">Total</div>
  </div>
</div>

<div class="divider"></div>

<div class="month-nav">
  <button id="prevMonth">&lsaquo;</button>
  <span class="month-label" id="monthLabel"></span>
  <button id="nextMonth">&rsaquo;</button>
</div>

<div class="weekday-header">
  <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
</div>

<div class="calendar" id="calendar"></div>

<div class="graph-section">
  <div class="graph-header">
    <p class="graph-label" id="graphLabel">Last 12 weeks</p>
    <div class="graph-toggle">
      <button id="btnDays">By day</button>
      <button id="btnWeekly" class="active">Weekly</button>
      <button id="btnMonthly">Monthly</button>
    </div>
  </div>
  <div class="graph-chart-wrap">
    <canvas id="yogaChart" role="img" aria-label="Bar chart of yoga days over time">Yoga practice frequency over time.</canvas>
  </div>
  <div class="graph-ends">
    <span id="leftLabel">12 weeks ago</span>
    <span id="rightLabel">this week</span>
  </div>
</div>

<div class="backup-section">
  <button class="backup-btn" id="exportBtn">Export</button>
  <button class="backup-btn" id="importBtn">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div>
<div class="backup-msg" id="backupMsg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const STORAGE_KEY = 'yoga_days';
  let viewYear, viewMonth;
  let yogaChart = null;
  let currentMode = 'weekly';

  function today() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function dateStr(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function load() {
    try {
      return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    } catch { return new Set(); }
  }

  function save(days) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...days]));
  }

  function toggle(date) {
    const days = load();
    if (days.has(date)) days.delete(date);
    else days.add(date);
    save(days);
    render();
  }

  function calcStreaks() {
    const days = load();
    const sorted = [...days].sort();
    const total = sorted.length;
    if (total === 0) return { current: 0, longest: 0, total: 0 };

    let current = 0;
    const t = new Date();
    const d = new Date(t.getFullYear(), t.getMonth(), t.getDate());
    const todayKey = dateStr(d.getFullYear(), d.getMonth(), d.getDate());
    if (!days.has(todayKey)) d.setDate(d.getDate() - 1);

    while (true) {
      const key = dateStr(d.getFullYear(), d.getMonth(), d.getDate());
      if (days.has(key)) { current++; d.setDate(d.getDate() - 1); }
      else break;
    }

    let longest = 1, run = 1;
    for (let i = 1; i < sorted.length; i++) {
      const prev = new Date(sorted[i-1] + 'T00:00:00');
      const curr = new Date(sorted[i] + 'T00:00:00');
      const diff = (curr - prev) / 86400000;
      if (diff === 1) { run++; longest = Math.max(longest, run); }
      else run = 1;
    }

    return { current, longest, total };
  }

  function isFuture(y, m, d) {
    const t = new Date();
    return new Date(y, m, d) > new Date(t.getFullYear(), t.getMonth(), t.getDate());
  }

  function isToday(y, m, d) {
    const t = new Date();
    return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
  }

  // Teal gradient: dark muted teal for low values, bright teal for high
  function tealColors(data, max) {
    return data.map(v => {
      const p = Math.min(v / max, 1);
      const r = Math.round(30 + (74 - 30) * (1 - p));
      const g = Math.round(80 + (165 - 80) * p);
      const b = Math.round(90 + (158 - 90) * p);
      return `rgb(${r},${g},${b})`;
    });
  }

  function setToggle(mode) {
    ['btnDays', 'btnWeekly', 'btnMonthly'].forEach(id => {
      document.getElementById(id).classList.remove('active');
    });
    const map = { days: 'btnDays', weekly: 'btnWeekly', monthly: 'btnMonthly' };
    document.getElementById(map[mode]).classList.add('active');
  }

  function getGraphData(mode, days) {
    if (mode === 'weekly') {
      const data = [], labels = [];
      const cursor = new Date();
      cursor.setHours(0, 0, 0, 0);
      cursor.setDate(cursor.getDate() - cursor.getDay());
      for (let w = 11; w >= 0; w--) {
        const sunday = new Date(cursor);
        sunday.setDate(cursor.getDate() - w * 7);
        let count = 0;
        for (let d = 0; d < 7; d++) {
          const day = new Date(sunday);
          day.setDate(sunday.getDate() + d);
          const key = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
          if (days.has(key)) count++;
        }
        data.push(count);
        labels.push(sunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
      }
      return { data, labels, max: 7, stepSize: 1, pctMode: false };

    } else if (mode === 'monthly') {
      const data = [], labels = [];
      const now = new Date();
      for (let m = 11; m >= 0; m--) {
        const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
        const y = d.getFullYear(), mo = d.getMonth();
        const daysInMonth = new Date(y, mo + 1, 0).getDate();
        let count = 0;
        for (let day = 1; day <= daysInMonth; day++) {
          const key = `${y}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          if (days.has(key)) count++;
        }
        data.push(count);
        labels.push(d.toLocaleDateString('en-US', { month: 'short' }));
      }
      return { data, labels, max: 31, stepSize: 5, pctMode: false };

    } else {
      // By day of week — % of available days practiced
      const counts = [0, 0, 0, 0, 0, 0, 0];
      const totals = [0, 0, 0, 0, 0, 0, 0];
      const now = new Date();
      const nowTime = now.getTime();

      // Find earliest date in data
      const sorted = [...days].sort();
      if (sorted.length === 0) return {
        data: [0,0,0,0,0,0,0],
        labels: ['Su','M','Tu','W','Th','F','Sa'],
        max: 100, stepSize: 25, pctMode: true
      };

      const start = new Date(sorted[0] + 'T00:00:00');
      const cursor = new Date(start);
      while (cursor <= now) {
        const dow = cursor.getDay();
        totals[dow]++;
        const key = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
        if (days.has(key)) counts[dow]++;
        cursor.setDate(cursor.getDate() + 1);
      }

      const data = totals.map((t, i) => t === 0 ? 0 : Math.round((counts[i] / t) * 100));
      return { data, labels: ['Su','M','Tu','W','Th','F','Sa'], max: 100, stepSize: 25, pctMode: true };
    }
  }

  function renderGraph(days) {
    const { data, labels, max, stepSize, pctMode } = getGraphData(currentMode, days);

    if (yogaChart) {
      yogaChart.data.labels = labels;
      yogaChart.data.datasets[0].data = data;
      yogaChart.data.datasets[0].backgroundColor = tealColors(data, max);
      yogaChart.options.scales.y.max = max;
      yogaChart.options.scales.y.ticks.stepSize = stepSize;
      yogaChart.options.scales.y.ticks.callback = pctMode ? v => v + '%' : undefined;
      yogaChart.options.plugins.tooltip.callbacks.label = ctx =>
        pctMode ? `${ctx.raw}% of ${ctx.label}s` : `${ctx.raw} ${ctx.raw === 1 ? 'day' : 'days'}`;
      yogaChart.update();
    } else {
      yogaChart = new Chart(document.getElementById('yogaChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: tealColors(data, max),
            borderRadius: 6,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => pctMode ? `${ctx.raw}% of ${ctx.label}s` : `${ctx.raw} ${ctx.raw === 1 ? 'day' : 'days'}`
              },
              backgroundColor: '#1a2440',
              titleColor: '#bed3c3',
              bodyColor: '#ebaca2',
            }
          },
          scales: {
            x: {
              ticks: { color: '#4a6a8a', font: { size: 10 }, maxRotation: 45, autoSkip: false },
              grid: { display: false },
              border: { display: false }
            },
            y: {
              min: 0, max,
              ticks: { stepSize, color: '#4a6a8a', font: { size: 10 }, callback: pctMode ? v => v + '%' : undefined },
              grid: { color: 'rgba(45,58,92,0.6)' },
              border: { display: false }
            }
          }
        }
      });

      document.getElementById('btnWeekly').addEventListener('click', () => {
        currentMode = 'weekly';
        setToggle('weekly');
        document.getElementById('graphLabel').textContent = 'Last 12 weeks';
        document.getElementById('leftLabel').textContent = '12 weeks ago';
        document.getElementById('rightLabel').textContent = 'this week';
        renderGraph(load());
      });

      document.getElementById('btnMonthly').addEventListener('click', () => {
        currentMode = 'monthly';
        setToggle('monthly');
        document.getElementById('graphLabel').textContent = 'Last 12 months';
        document.getElementById('leftLabel').textContent = '12 months ago';
        document.getElementById('rightLabel').textContent = 'this month';
        renderGraph(load());
      });

      document.getElementById('btnDays').addEventListener('click', () => {
        currentMode = 'days';
        setToggle('days');
        document.getElementById('graphLabel').textContent = 'By day of week';
        document.getElementById('leftLabel').textContent = '';
        document.getElementById('rightLabel').textContent = '';
        renderGraph(load());
      });
    }
  }

  function render() {
    const days = load();
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('monthLabel').textContent = `${monthNames[viewMonth]} ${viewYear}`;

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'day empty';
      cal.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      const key = dateStr(viewYear, viewMonth, d);
      const future = isFuture(viewYear, viewMonth, d);
      const todayFlag = isToday(viewYear, viewMonth, d);
      let cls = 'day';
      if (days.has(key)) cls += ' completed';
      if (todayFlag) cls += ' today';
      if (future) cls += ' future';
      el.className = cls;
      el.textContent = d;
      if (!future) el.addEventListener('click', () => toggle(key));
      cal.appendChild(el);
    }

    const s = calcStreaks();
    document.getElementById('currentStreak').textContent = s.current;
    document.getElementById('longestStreak').textContent = s.longest;
    document.getElementById('totalDays').textContent = s.total;

    renderGraph(days);
  }

  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  document.getElementById('prevMonth').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const days = load();
    const data = JSON.stringify([...days].sort(), null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `yoga-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showMsg('Backup saved');
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) throw new Error('Invalid format');
        const existing = load();
        imported.forEach(d => existing.add(d));
        save(existing);
        render();
        showMsg(`Imported ${imported.length} days`);
      } catch {
        showMsg('Invalid backup file');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  function showMsg(text) {
    const el = document.getElementById('backupMsg');
    el.textContent = text;
    setTimeout(() => el.textContent = '', 3000);
  }

  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
